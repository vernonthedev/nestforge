name: Bug Report
description: Report a reproducible defect in NestForge.
title: "bug: "
labels:
  - triage-needed
body:
  - type: markdown
    attributes:
      value: |
        Provide a minimal reproducible example. Issues without reproduction details are hard to validate and usually stall.
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - core
        - modules
        - cli
    validations:
      required: true
  - type: input
    id: nestforge_version
    attributes:
      label: NestForge Version
      placeholder: 1.2.1
    validations:
      required: true
  - type: input
    id: rust_version
    attributes:
      label: Rust Version
      placeholder: rustc 1.87.0
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: Windows 11 / Ubuntu 24.04 / macOS 15
    validations:
      required: true
  - type: input
    id: edition
    attributes:
      label: Rust Edition
      placeholder: 2021
    validations:
      required: true
  - type: textarea
    id: summary
    attributes:
      label: Bug Summary
      placeholder: What is failing, and what did you expect instead?
    validations:
      required: true
  - type: textarea
    id: mre
    attributes:
      label: Minimal Reproducible Example
      description: Include the smallest code, command sequence, or repo layout that reproduces the bug.
      render: shell
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true
  - type: textarea
    id: cargo_output
    attributes:
      label: cargo check / cargo test Output
      description: Paste the exact output from `cargo check`, `cargo test`, or the failing command.
      render: shell
    validations:
      required: true
