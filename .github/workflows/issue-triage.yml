name: Issue Triage

on:
  issues:
    types: [opened, edited]

permissions:
  issues: write

jobs:
  label:
    runs-on: ubuntu-latest
    steps:
      - name: Apply triage and area labels
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const body = issue.body || "";
            const labels = new Set((issue.labels || []).map((label) => label.name));

            labels.add("triage-needed");

            const areaMatch = body.match(/### Area\s+([^\n\r]+)/i);
            const area = areaMatch?.[1]?.trim().toLowerCase();

            for (const label of ["core", "modules", "cli"]) {
              labels.delete(label);
            }

            if (["core", "modules", "cli"].includes(area)) {
              labels.add(area);
            }

            await github.rest.issues.setLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              labels: [...labels],
            });
